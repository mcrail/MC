<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manuel Crail</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: #f4f3ef;
    color: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  .card {
    width: 100%;
    max-width: 380px;
    background: #ffffff;
    border: 1px solid #e3e1da;
    border-radius: 16px;
    padding: 32px 28px;
    text-align: center;
  }

  .lang-toggle {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 20px;
  }

  .lang-btn {
    padding: 6px 16px;
    border-radius: 8px;
    border: 1px solid #d8d6cf;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    color: #6b6a64;
    transition: background-color 0.15s, color 0.15s;
  }

  .lang-btn.active {
    background: #f0efe9;
    color: #1a1a1a;
  }

  .avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: #e6f1fb;
    color: #0c447c;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 20px;
    margin: 0 auto 16px;
  }

  .name {
    font-weight: 600;
    font-size: 18px;
    margin-bottom: 4px;
  }

  .title {
    font-size: 14px;
    color: #6b6a64;
    margin-bottom: 24px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 8px;
    border: 1px solid #d8d6cf;
    background: #f7f6f2;
    color: #1a1a1a;
    text-decoration: none;
    font-size: 15px;
    font-weight: 500;
    transition: background-color 0.15s;
  }

  .btn:hover {
    background: #efeee8;
  }

  .btn svg {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
  }

  .location {
    font-size: 12px;
    color: #9a988f;
    margin-top: 20px;
  }
</style>
</head>
<body>

  <div class="card">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-es" onclick="setLang('es')">Español</button>
      <button class="lang-btn" id="btn-en" onclick="setLang('en')">Inglés</button>
    </div>

    <div class="avatar">MC</div>

    <p class="name">Manuel Crail</p>
    <p class="title">IT Executive | Business · Technology · AI</p>

    <a id="cv-link" class="btn" href="https://1drv.ms/b/c/a51297f003ab9345/IQBcG5BP3ALtQpLgwfONoWWGAafvtWic0-bW1GkHIV6FVjs?e=SNLXqi&download=1" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
      <span id="cv-label">Ver CV en PDF</span>
    </a>

    <a class="btn" href="https://linkedin.com/in/manuelcrail" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"></path></svg>
      <span id="li-label">Ver LinkedIn</span>
    </a>

    <p class="location" id="location-label">Ciudad de México, México</p>
  </div>

<script>
  const links = {
    es: "https://1drv.ms/b/c/a51297f003ab9345/IQBcG5BP3ALtQpLgwfONoWWGAafvtWic0-bW1GkHIV6FVjs?e=SNLXqi&download=1",
    en: "https://1drv.ms/b/c/a51297f003ab9345/IQA-1COWk6HrSI3kXwNvdFlUAS9eddXscfvJlYUf7l6eJaw?e=V2KUMU&download=1"
  };

  const labels = {
    es: { cv: "Ver CV en PDF", li: "Ver LinkedIn", loc: "Ciudad de México, México" },
    en: { cv: "View resume (PDF)", li: "View LinkedIn", loc: "Mexico City, Mexico" }
  };

  const btnEs = document.getElementById('btn-es');
  const btnEn = document.getElementById('btn-en');
  const cvLink = document.getElementById('cv-link');
  const cvLabel = document.getElementById('cv-label');
  const liLabel = document.getElementById('li-label');
  const locationLabel = document.getElementById('location-label');

  function setLang(lang) {
    cvLink.href = links[lang];
    cvLabel.textContent = labels[lang].cv;
    liLabel.textContent = labels[lang].li;
    locationLabel.textContent = labels[lang].loc;

    if (lang === 'es') {
      btnEs.classList.add('active');
      btnEn.classList.remove('active');
      document.documentElement.lang = 'es';
    } else {
      btnEn.classList.add('active');
      btnEs.classList.remove('active');
      document.documentElement.lang = 'en';
    }
  }
</script>

</body>
</html>
